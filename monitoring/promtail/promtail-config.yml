server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ai-platform
    static_configs:
      - targets:
          - localhost
        labels:
          job: ai-platform
          app: ai-testing-platform
          __path__: /var/log/ai-platform/*.log
    pipeline_stages:
      - regex:
          expression: '.*/(?P<source>[^/]+)\.log'
          source: filename
      - labels:
          source:
      # 应用日志: [2026-07-01 10:00:00] [WARNING] [app.api] message
      - regex:
          expression: '^\[(?P<timestamp>[^\]]+)\] \[(?P<level>[^\]]+)\](?: \[(?P<logger>[^\]]+)\])? (?P<message>.*)$'
      - labels:
          level:
      # Uvicorn 日志: INFO:     127.0.0.1:8000 - "GET /api HTTP/1.1" 400 Bad Request
      - regex:
          expression: '^(?P<level>INFO|WARNING|ERROR|DEBUG|CRITICAL):\s+(?P<uvicorn_message>.*)$'
