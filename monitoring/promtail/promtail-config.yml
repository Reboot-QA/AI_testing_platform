server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ai-platform
    static_configs:
      - targets:
          - localhost
        labels:
          job: ai-platform
          app: ai-testing-platform
          __path__: /var/log/ai-platform/*.log
    pipeline_stages:
      - regex:
          expression: '.*/(?P<source>[^/]+)\.log'
          source: filename
      - labels:
          source:
      - regex:
          expression: '^\[(?P<timestamp>[^\]]+)\] \[(?P<level>[^\]]+)\](?: \[(?P<logger>[^\]]+)\])? (?P<message>.*)$'
      - labels:
          level:
