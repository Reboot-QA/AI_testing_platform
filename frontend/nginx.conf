server {
    listen 80;
    server_name _;

    access_log /var/log/ai-platform/frontend.log combined;
    error_log /var/log/ai-platform/frontend.error.log warn;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Docker 内置 DNS，backend 重启后可重新解析
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Grafana iframe 内客户端路由逃逸到站点根路径时的兜底（转发到后端代理）
    location ~ ^/(d|explore|public|avatar|apis)(/|$) {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream/api/v1/logs/grafana$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Grafana 内部 API（与平台 /api/v1 路径不冲突）
    location ~ ^/api/(dashboards|datasources|ds|search|frontend|plugins|live|alerting|annotations|org|user|login|logout|auth|access-control|teams|folders|library-elements|metrics|admin|frontendsettings|prometheus|rules|ruler|ngalert|plugin|query-history|short-urls|snapshot|unified|sql|metrics/find|frontend/assets|loki|queries|resources|ds/query) {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream/api/v1/logs/grafana$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /docs {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $http_host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
