name: jenkins

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: ai-platform-jenkins:lts
    container_name: ai-platform-jenkins
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx768m -Djenkins.install.runSetupWizard=false -Duser.timezone=Asia/Shanghai"
      APP_DIR: ${APP_DIR:-/opt/AI_testing_platform}
      ENV_FILE: ${ENV_FILE:-/opt/AI_testing_platform/.env.docker}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-change-me-webhook-secret}
      JENKINS_ADMIN_USER: ${JENKINS_ADMIN_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-}
      DISABLE_JENKINS_AUTH: ${DISABLE_JENKINS_AUTH:-0}
      TZ: Asia/Shanghai
    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # 固定挂载部署目录（勿用变量，避免 .env 未配置导致挂载失败）
      - /opt/AI_testing_platform:/opt/AI_testing_platform
    group_add:
      - "${DOCKER_GID:-999}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    networks:
      - jenkins

networks:
  jenkins:
    driver: bridge

volumes:
  jenkins-data:
